<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Single+Day&family=Yeon+Sung&display=swap" rel="stylesheet">    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지들할말만하내</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="logo">
    <h1 class="title">지들할말만하내</h1>
    </div>

    <button id="darkmode-btn">눈이 너무 아파요</button>

    <div class="post-box">

        <div class="profile-wrap">
            <div class="profile" id="profile-display" onclick="openSheet()"></div>
            <input type="file" id="profile-upload" accept="image/*" onchange="updateProfile(this)">
        </div>

        <div class="post-content">
            <textarea placeholder="무슨일이잇는지안궁금한데일단말해봐"></textarea>
            <button id="post-btn">게시</button>
        </div>

    </div>
    
    <div id="feed-list"></div>
    
    <dialog id="profile-sheet">
        <button id="crop-done-btn" onclick="confirmCrop()">완료</button>

        <div class="sheet-content" >

            <div class="crop-container">
                <img id="crop-image">
            </div>

            <div class="sheet-group">
                <button id="upload-btn" onclick="document.getElementById('profile-upload').click();">사진 변경</button>
                <button class="delete" onclick="deletePhoto()">사진 삭제</button>
            </div>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
